# Admin panel at https://admin.skshopping.store
# Static frontend (built on a dev machine with `reflex export --frontend-only`,
# shipped as deploy/admin-frontend.zip) + Reflex Python backend on 127.0.0.1:8001.
# The VPS CPU lacks AVX, so Bun/Node cannot run there — never use `reflex run`
# dev mode on the VPS; only `reflex run --backend-only`.
#
# Install/update:
#   sudo mkdir -p /var/www/bondom-admin
#   sudo unzip -o deploy/admin-frontend.zip -d /var/www/bondom-admin
#   sudo cp deploy/admin-nginx.conf /etc/nginx/sites-available/admin
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name admin.skshopping.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.skshopping.store;

    ssl_certificate /etc/letsencrypt/live/admin.skshopping.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.skshopping.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/bondom-admin;
    index index.html;

    # Reflex state websocket
    location /_event {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /ping {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    location /_upload {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        client_max_body_size 50m;
    }

    location / {
        try_files $uri $uri.html $uri/ /__spa-fallback.html;
    }
}
