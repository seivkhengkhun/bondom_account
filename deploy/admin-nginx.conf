# Reverse proxy: https://admin.skshopping.store -> Reflex admin panel
# Frontend (port 3000) and Reflex event backend (port 8001) behind one domain.
# Install: sudo cp deploy/admin-nginx.conf /etc/nginx/sites-available/admin
#          sudo ln -sf /etc/nginx/sites-available/admin /etc/nginx/sites-enabled/admin
#          sudo nginx -t && sudo systemctl reload nginx
# Then run certbot to add HTTPS (rewrites this file automatically):
#          sudo certbot --nginx -d admin.skshopping.store

server {
    listen 80;
    server_name admin.skshopping.store;

    # Reflex state websocket
    location /_event {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /ping {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    location /_upload {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        client_max_body_size 50m;
    }

    # Frontend (dev server needs websocket upgrade for hot reload too)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
