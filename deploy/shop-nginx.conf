# Customer storefront: https://skshopping.store -> FastAPI on 127.0.0.1:8000
# The same FastAPI process also exposes the internal JSON API, which must
# NOT be reachable from the public site — those paths return 404 here.
#
# Install:
#   sudo cp deploy/shop-nginx.conf /etc/nginx/sites-available/shop
#   sudo ln -sf /etc/nginx/sites-available/shop /etc/nginx/sites-enabled/shop
#   sudo nginx -t && sudo systemctl reload nginx
# Then HTTPS (after DNS points here):
#   sudo certbot --nginx -d skshopping.store -d www.skshopping.store

server {
    listen 80;
    server_name skshopping.store www.skshopping.store;

    # Block the internal API/docs from the public storefront domain.
    location ~ ^/(docs|redoc|openapi\.json|users|products|orders|payments)(/|$) {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
